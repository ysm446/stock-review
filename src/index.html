<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Review</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <button class="nav-button is-active" data-view="portfolio" title="Portfolio" aria-label="Portfolio">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 18.5V10.5"></path>
              <path d="M12 18.5V6.5"></path>
              <path d="M19 18.5V13.5"></path>
              <path d="M3.5 18.5h17"></path>
            </svg>
          </button>
          <button class="nav-button" data-view="review" title="Review" aria-label="Review">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 4h8l4 4v12H6zm8 1.5V9h3.5"></path>
              <path d="M9 13h6m-6 3h6"></path>
            </svg>
          </button>
        </nav>
        <div class="sidebar-foot">2026</div>
      </aside>

      <main class="main-panel">
        <section class="view is-visible" id="view-portfolio">
          <header class="hero">
            <div>
              <h1>ポートフォリオ</h1>
            </div>
            <div class="hero-actions">
              <button class="ghost-button" id="export-portfolio">エクスポート</button>
              <button class="ghost-button" id="import-portfolio">インポート</button>
              <button class="ghost-button" id="refresh-prices">価格を更新</button>
            </div>
          </header>

          <p class="status-banner is-hidden" id="price-status"></p>

          <section class="stats-grid" id="stats-grid"></section>

          <section class="panel trend-panel">
            <div class="trend-head">
              <div class="trend-title-group">
                <h2>評価額推移</h2>
                <select id="trend-range" class="trend-select">
                  <option value="1m">1ヶ月</option>
                  <option value="3m" selected>3ヶ月</option>
                  <option value="6m">6ヶ月</option>
                  <option value="1y">1年</option>
                </select>
              </div>
              <div class="trend-metrics">
                <div class="trend-metric">
                  <span class="trend-metric-label">前日比</span>
                  <strong class="trend-metric-value" id="trend-daily-change">-</strong>
                </div>
                <div class="trend-metric">
                  <span class="trend-metric-label">期間変動</span>
                  <strong class="trend-metric-value" id="trend-period-change">-</strong>
                </div>
              </div>
            </div>
            <div class="trend-chart-wrap" id="trend-chart-wrap">
              <canvas id="trend-chart" width="1440" height="320"></canvas>
              <div class="trend-tooltip is-hidden" id="trend-tooltip">
                <div class="trend-tooltip-date" id="trend-tooltip-date">-</div>
                <div class="trend-tooltip-value" id="trend-tooltip-value">-</div>
                <div class="trend-tooltip-change" id="trend-tooltip-change">-</div>
              </div>
            </div>
          </section>

          <section class="panel panel-chart panel-chart-wide">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">Allocation</p>
                <h2>保有割合チャート</h2>
              </div>
            </div>

            <div class="allocation-grid">
              <div class="chart-stack">
                <canvas id="allocation-chart" width="620" height="430"></canvas>
                <div class="legend" id="allocation-legend"></div>
              </div>

              <div class="performance-panel">
                <div class="performance-head">
                  <h3>銘柄別損益</h3>
                </div>
                <div class="performance-chart" id="performance-chart"></div>
              </div>
            </div>
          </section>

          <section class="content-grid">
            <article class="panel panel-table">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker">Holdings</p>
                  <h2>保有銘柄</h2>
                </div>
                <div class="panel-actions">
                  <div class="view-toggle" role="tablist" aria-label="Holdings table mode">
                    <button class="view-toggle-button is-active" id="holdings-mode-positions" type="button" data-mode="positions" aria-pressed="true">株式情報</button>
                    <button class="view-toggle-button" id="holdings-mode-metrics" type="button" data-mode="metrics" aria-pressed="false">企業指標</button>
                  </div>
                  <button class="accent-button" id="add-holding">銘柄を追加</button>
                </div>
              </div>

              <div class="table-wrap">
                <table class="holdings-table">
                  <thead id="holdings-head">
                    <tr>
                      <th class="drag-column"></th>
                      <th>銘柄</th>
                      <th>株数</th>
                      <th>平均単価</th>
                      <th>現在値</th>
                      <th>
                        <button type="button" class="table-toggle" id="day-change-toggle" aria-pressed="false">前日比</button>
                      </th>
                      <th>前日比（％）</th>
                      <th>損益</th>
                      <th>損益（％）</th>
                      <th>評価額</th>
                      <th>割合</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="holdings-body"></tbody>
                </table>
              </div>
            </article>

            <article class="panel panel-table">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker">Watchlist</p>
                  <h2>ウォッチリスト</h2>
                </div>
                <div class="panel-actions">
                  <div class="view-toggle" role="tablist" aria-label="Watchlist table mode">
                    <button class="view-toggle-button is-active" id="watchlist-mode-positions" type="button" data-mode="positions" aria-pressed="true">株式情報</button>
                    <button class="view-toggle-button" id="watchlist-mode-metrics" type="button" data-mode="metrics" aria-pressed="false">企業指標</button>
                  </div>
                  <button class="accent-button" id="add-watchlist">ウォッチ追加</button>
                </div>
              </div>

              <div class="table-wrap">
                <table class="watchlist-table">
                  <thead id="watchlist-head">
                    <tr>
                      <th class="drag-column"></th>
                      <th>銘柄</th>
                      <th>現在値</th>
                      <th>前日比</th>
                      <th>前日比（％）</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="watchlist-body"></tbody>
                </table>
              </div>
            </article>
          </section>
        </section>

        <section class="view" id="view-review">
          <header class="hero hero-review">
            <div>
              <h1>個別銘柄レビュー</h1>
            </div>
            <div class="hero-actions review-actions">
              <div class="search-select review-search">
                <input id="review-ticker-input" type="text" placeholder="285A.T / KIOXIA / 三菱" autocomplete="off" />
                <div class="search-dropdown is-hidden" id="review-ticker-suggestions"></div>
              </div>
              <button class="accent-button" id="load-review">表示</button>
            </div>
          </header>

          <section class="review-dashboard">
            <div class="review-chip-row" id="review-chip-row"></div>

            <div class="review-grid-layout">
              <article class="panel review-panel review-overview-panel">
                <div class="review-symbol" id="review-symbol">-</div>
                <div class="review-divider"></div>
                <div class="review-kv-grid" id="review-overview-grid"></div>
              </article>

              <article class="panel review-panel">
                <div class="panel-head">
                  <div>
                    <h2>バリュエーション</h2>
                  </div>
                </div>
                <div class="review-kv-grid" id="review-valuation-grid"></div>
              </article>

              <article class="panel review-panel">
                <div class="panel-head">
                  <div>
                    <h2>収益性</h2>
                  </div>
                </div>
                <div class="review-kv-grid" id="review-profitability-grid"></div>
              </article>

              <article class="panel review-panel review-financial-panel">
                <div class="panel-head">
                  <div>
                    <h2>財務サマリー</h2>
                  </div>
                </div>
                <div class="table-wrap">
                  <table class="review-table">
                    <thead>
                      <tr>
                        <th>期</th>
                        <th>売上高</th>
                        <th>営業利益</th>
                        <th>純利益</th>
                      </tr>
                    </thead>
                    <tbody id="review-financial-body"></tbody>
                  </table>
                </div>
              </article>

              <article class="panel review-panel">
                <div class="panel-head">
                  <div>
                    <h2>アナリスト情報</h2>
                  </div>
                </div>
                <div class="review-kv-grid" id="review-analyst-grid"></div>
              </article>

              <article class="panel review-panel review-news-panel">
                <div class="panel-head">
                  <div>
                    <h2>最新ニュース</h2>
                  </div>
                </div>
                <ul class="review-news-list" id="review-news-list"></ul>
              </article>
            </div>

          </section>
        </section>
      </main>
    </div>

    <template id="holding-row-template">
      <tr>
        <td class="drag-cell">
          <button class="drag-handle" data-action="drag-handle" type="button" aria-label="Reorder holding">
            <span></span>
            <span></span>
          </button>
        </td>
        <td class="cell-ticker">
          <button class="ticker-link" data-action="open-review" type="button">
            <span class="ticker-name" data-field="displayName">-</span>
          </button>
          <div class="ticker-code" data-field="ticker">-</div>
        </td>
        <td class="cell-number" data-field="shares">0</td>
        <td class="cell-number" data-field="buyPrice">-</td>
        <td class="computed-cell" data-field="price">-</td>
        <td class="computed-cell profit-cell" data-field="dayChange">0</td>
        <td class="computed-cell profit-rate-cell" data-field="dayChangeRate">0%</td>
        <td class="computed-cell profit-cell" data-field="profitLoss">0</td>
        <td class="computed-cell profit-rate-cell" data-field="profitRate">0%</td>
        <td class="computed-cell" data-field="marketValue">0</td>
        <td class="computed-cell" data-field="weight">0%</td>
        <td class="row-actions">
          <button class="table-action" data-action="edit-holding">編集</button>
          <button class="icon-remove" data-action="remove-holding" aria-label="remove">×</button>
        </td>
      </tr>
    </template>

    <template id="watchlist-row-template">
      <tr>
        <td class="drag-cell">
          <button class="drag-handle" data-action="drag-handle" type="button" aria-label="Reorder watchlist">
            <span></span>
            <span></span>
          </button>
        </td>
        <td class="cell-ticker">
          <button class="ticker-link" data-action="open-review" type="button">
            <span class="ticker-name" data-field="displayName">-</span>
          </button>
          <div class="ticker-code" data-field="ticker">-</div>
        </td>
        <td class="computed-cell" data-field="price">-</td>
        <td class="computed-cell profit-cell" data-field="dayChange">-</td>
        <td class="computed-cell profit-rate-cell" data-field="dayChangeRate">-</td>
        <td class="row-actions">
          <button class="table-action" data-action="edit-watchlist">編集</button>
          <button class="icon-remove" data-action="remove-watchlist" aria-label="remove">×</button>
        </td>
      </tr>
    </template>

    <div class="modal-backdrop is-hidden" id="holding-modal-backdrop">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="holding-modal-title">
        <div class="modal-head">
          <h2 id="holding-modal-title">銘柄を追加</h2>
          <button class="icon-remove" id="close-holding-modal" aria-label="close">×</button>
        </div>
        <form class="modal-form" id="holding-form">
          <label>
            <span>銘柄コード</span>
            <div class="search-select">
              <input id="holding-ticker-input" name="ticker" type="text" placeholder="AAPL / 7203.T / 三菱" autocomplete="off" required />
              <div class="search-dropdown is-hidden" id="holding-ticker-suggestions"></div>
            </div>
          </label>
          <label>
            <span>株数</span>
            <input id="holding-shares-input" name="shares" type="text" inputmode="numeric" placeholder="100" required />
          </label>
          <label>
            <span>買値</span>
            <input id="holding-buy-price-input" name="buyPrice" type="text" inputmode="numeric" placeholder="2841" required />
          </label>
          <div class="modal-actions">
            <button type="button" class="ghost-button" id="cancel-holding-modal">キャンセル</button>
            <button type="submit" class="accent-button" id="submit-holding-modal">保存</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop is-hidden" id="watchlist-modal-backdrop">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="watchlist-modal-title">
        <div class="modal-head">
          <h2 id="watchlist-modal-title">ウォッチリストに追加</h2>
          <button class="icon-remove" id="close-watchlist-modal" aria-label="close">×</button>
        </div>
        <form class="modal-form" id="watchlist-form">
          <label>
            <span>銘柄コード</span>
            <div class="search-select">
              <input id="watchlist-ticker-input" name="ticker" type="text" placeholder="AAPL / 7203.T / 任天堂" autocomplete="off" required />
              <div class="search-dropdown is-hidden" id="watchlist-ticker-suggestions"></div>
            </div>
          </label>
          <label>
            <span>評価</span>
            <input id="watchlist-rating-input" name="rating" type="text" placeholder="A" />
          </label>
          <label>
            <span>投資仮説</span>
            <textarea id="watchlist-thesis-input" name="thesis" rows="3" placeholder="注目理由"></textarea>
          </label>
          <label>
            <span>リスク</span>
            <textarea id="watchlist-risk-input" name="risk" rows="3" placeholder="気になる点"></textarea>
          </label>
          <div class="modal-actions">
            <button type="button" class="ghost-button" id="cancel-watchlist-modal">キャンセル</button>
            <button type="submit" class="accent-button" id="submit-watchlist-modal">保存</button>
          </div>
        </form>
      </section>
    </div>

    <div class="metric-help-popup is-hidden" id="metric-help-popup" role="dialog" aria-live="polite" aria-labelledby="metric-help-popup-title">
      <div class="metric-help-content">
        <h3 class="metric-help-popup-title" id="metric-help-popup-title">指標の説明</h3>
        <p class="metric-help-text" id="metric-help-popup-text"></p>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
